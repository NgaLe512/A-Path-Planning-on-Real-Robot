slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    publish_tf: true

    mode: mapping
    resolution: 0.05
    max_laser_range: 20.0

    minimum_time_interval: 0.3    # ← throttle to ~3 scans/sec for matching
    transform_timeout: 1.0        # ← tighten; 1.0 s is too loose
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    map_update_interval: 1.0      # ← update map more frequently

    # Scan matcher tuning — tighten to reduce drift
    minimum_travel_distance: 0.05   # ← only match if moved 5 cm
    minimum_travel_heading: 0.1    # ← or rotated ~6°
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45